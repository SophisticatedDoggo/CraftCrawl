name: Capacitor Android Build

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'android/**'
      - 'mobile/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/capacitor-android.yml'
  pull_request:
    paths:
      - 'android/**'
      - 'mobile/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/capacitor-android.yml'
  workflow_dispatch:
    inputs:
      target:
        description: Build target
        required: true
        type: choice
        options:
          - staging
          - prod
        default: staging
      app_icon:
        description: Initial app icon style; users can change it later in app settings
        required: true
        type: choice
        options:
          - trail
          - trail-dark
          - ember
          - ember-dark
        default: trail

jobs:
  android-debug-build:
    runs-on: ubuntu-latest

    env:
      CRAFTCRAWL_APP_ENV: ${{ (github.event_name == 'workflow_dispatch' && inputs.target) || (github.ref_name == 'main' && 'prod' || 'staging') }}
      CRAFTCRAWL_MOBILE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'prod') || github.ref_name == 'main' && 'https://app.craftcrawl.site' || 'https://staging.craftcrawl.site' }}
      CRAFTCRAWL_APP_ICON: ${{ github.event.inputs.app_icon || 'trail' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate manual branch target
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.target }}" = "prod" ] && [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Prod mobile builds must run from main."
            exit 1
          fi

          if [ "${{ inputs.target }}" = "staging" ] && [ "${GITHUB_REF_NAME}" != "develop" ]; then
            echo "Staging mobile builds must run from develop."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Create Android project when missing
        run: test -d android || npx cap add android

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          if [ "$CRAFTCRAWL_APP_ENV" = "prod" ]; then
            cd android && ./gradlew assembleProdDebug
          else
            cd android && ./gradlew assembleStagingDebug
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: craftcrawl-${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref_name == 'main' && 'prod' || 'staging') }}-debug-apk
          path: android/app/build/outputs/apk/**/debug/*.apk
