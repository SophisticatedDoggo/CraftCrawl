name: Capacitor Android Build

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'mobile/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/capacitor-android.yml'
  pull_request:
    paths:
      - 'android/**'
      - 'mobile/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/capacitor-android.yml'
  workflow_dispatch:
    inputs:
      app_icon:
        description: Initial app icon style; users can change it later in app settings
        required: true
        type: choice
        options:
          - trail
          - trail-dark
          - ember
          - ember-dark
          - riverstone
          - riverstone-dark
          - blackberry
          - blackberry-dark
          - barnwood
          - barnwood-dark
        default: trail

jobs:
  android-debug-build:
    runs-on: ubuntu-latest

    env:
      CRAFTCRAWL_APP_ENV: prod
      CRAFTCRAWL_MOBILE_URL: https://app.craftcrawl.site
      CRAFTCRAWL_APP_ICON: ${{ github.event.inputs.app_icon || 'trail' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate branch target
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Prod mobile builds must run from main."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Generate selected splash assets
        run: CRAFTCRAWL_SPLASH_STYLE="$CRAFTCRAWL_APP_ICON" npm run assets:splash

      - name: Create Android project when missing
        run: test -d android || npx cap add android

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleProdDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: craftcrawl-prod-debug-apk
          path: android/app/build/outputs/apk/**/debug/*.apk
