name: Capacitor iOS Build

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'ios/**'
      - 'mobile/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/capacitor-ios.yml'
  pull_request:
    paths:
      - 'ios/**'
      - 'mobile/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/capacitor-ios.yml'
  workflow_dispatch:
    inputs:
      target:
        description: Build target
        required: true
        type: choice
        options:
          - staging
          - prod
        default: staging

jobs:
  ios-simulator-build:
    runs-on: macos-latest

    env:
      CRAFTCRAWL_APP_ENV: ${{ (github.event_name == 'workflow_dispatch' && inputs.target) || (github.ref_name == 'main' && 'prod' || 'staging') }}
      CRAFTCRAWL_MOBILE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'prod') || github.ref_name == 'main' && 'https://app.craftcrawl.site' || 'https://staging.craftcrawl.site' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate manual branch target
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.target }}" = "prod" ] && [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Prod mobile builds must run from main."
            exit 1
          fi

          if [ "${{ inputs.target }}" = "staging" ] && [ "${GITHUB_REF_NAME}" != "develop" ]; then
            echo "Staging mobile builds must run from develop."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create iOS project when missing
        run: test -d ios || npx cap add ios

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v4
        with:
          name: craftcrawl-${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref_name == 'main' && 'prod' || 'staging') }}-ios-simulator-app
          path: ios/build/Build/Products/Debug-iphonesimulator/App.app
