name: Capacitor iOS Build

on:
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - 'mobile/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/capacitor-ios.yml'
  pull_request:
    paths:
      - 'ios/**'
      - 'mobile/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/capacitor-ios.yml'
  workflow_dispatch:
    inputs:
      app_icon:
        description: App icon style
        required: true
        type: choice
        options:
          - AppIcon
          - AppIcon-Trail
          - AppIcon-TrailDark
          - AppIcon-Ember
          - AppIcon-EmberDark
        default: AppIcon

jobs:
  ios-simulator-build:
    runs-on: macos-26

    env:
      CRAFTCRAWL_APP_ENV: prod
      CRAFTCRAWL_MOBILE_URL: https://app.craftcrawl.site
      CRAFTCRAWL_APP_ICON_NAME: ${{ github.event.inputs.app_icon || 'AppIcon' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate branch
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "iOS mobile builds must run from main."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create iOS project when missing
        run: test -d ios || npx cap add ios

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CRAFTCRAWL_APP_ICON_NAME="$CRAFTCRAWL_APP_ICON_NAME" \
            build

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v4
        with:
          name: craftcrawl-prod-ios-simulator-app
          path: ios/build/Build/Products/Debug-iphonesimulator/App.app
