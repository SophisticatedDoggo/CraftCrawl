<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/png" href="../images/craft-crawl-logo-trail.png">
    <title>CraftCrawl</title>
    <style>
        @font-face {
            font-family: "Proxima Nova";
            src: url("../fonts/Proxima Nova/Proxima Nova Regular/Proxima Nova Regular.ttf") format("truetype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: "Proxima Nova";
            src: url("../fonts/Proxima Nova/Proxima Nova Extrabold/Proxima Nova Extrabold.ttf") format("truetype");
            font-weight: 800;
            font-style: normal;
            font-display: swap;
        }

        :root {
            color-scheme: light;
            font-family: "Proxima Nova", "Helvetica Neue", Arial, sans-serif;
            background: #f6f1e8;
            color: #24231f;
        }

        body {
            display: grid;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            place-items: center;
        }

        main {
            display: grid;
            max-width: 420px;
            gap: 12px;
            text-align: center;
        }

        img {
            width: 80px;
            margin: 0 auto;
            border-radius: 8px;
        }

        h1,
        p {
            margin: 0;
        }

        h1 {
            font-size: 2rem;
        }

        p {
            color: #686257;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main>
        <img src="../images/craft-crawl-logo-trail.png" alt="CraftCrawl logo">
        <h1>CraftCrawl</h1>
        <p>Connect to the internet and reopen the app to load CraftCrawl.</p>
    </main>
</body>
</html>
