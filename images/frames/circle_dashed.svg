<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title">
  <title>Dashed Circle</title>
  <defs>
    <mask id="portrait-safe-frame" maskUnits="userSpaceOnUse">
      <rect width="128" height="128" fill="#fff"/>
      <circle cx="64" cy="64" r="42" fill="#000"/>
    </mask>
  </defs>
  <g mask="url(#portrait-safe-frame)">
    <circle cx="64" cy="64" r="47" fill="none" stroke="#000" stroke-width="10" stroke-dasharray="12 8"/>
  </g>
</svg>
